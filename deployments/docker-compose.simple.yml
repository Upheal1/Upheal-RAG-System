services:
  gateway:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - UPHEAL_CHROMA_PATH=./data/vector_db_mini
      - UPHEAL_CHROMA_COLLECTION=clinical_rag_mini
      - LOG_LEVEL=INFO
    volumes:
      - ../data:/app/data
    networks:
      - upheal-network
    restart: unless-stopped

networks:
  upheal-network:
    driver: bridge