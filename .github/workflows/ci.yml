# CI: lint (syntax) + tests — required before merge when branch protection is configured.
name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Caching here saves time if you add linting tools (flake8, black) later
          cache: 'pip' 

      - name: Syntax check (compileall)
        run: python -m compileall -q services tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # This checks for a requirements.txt and restores the cache automatically
          cache: 'pip'

      - name: Install dependencies
        # Python setup-python handles the cache; pip will only download what's missing
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests -v --tb=short
